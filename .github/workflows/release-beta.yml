name: Beta Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.0)"
        required: true
        type: string

jobs:
  beta-release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Guard against non-main branches
        run: |
          if [[ "$(git rev-parse --abbrev-ref HEAD)" != "main" ]]; then
            echo "❌ This workflow must be run from the main branch."
            exit 1
          fi

      - name: Get latest commit hash
        id: commit
        run: echo "short_hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download mupen-release artifact from latest main run
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          branch: main
          name: mupen-release
          path: ./release-artifact

      - name: Zip release artifact
        run: |
          zip -r mupen64-rr-lua-${{ inputs.version }}-beta-${{ steps.commit.outputs.short_hash }}.zip \
            ./release-artifact/

      - name: Get latest stable release tag
        id: stable_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(gh release list --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || true)
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog with git-cliff
        id: changelog
        run: |
          if [ -n "${{ steps.stable_tag.outputs.tag }}" ]; then
            git cliff --config cliff.toml --output CHANGELOG_DRAFT.md \
              "${{ steps.stable_tag.outputs.tag }}..HEAD"
          else
            git cliff --unreleased --config cliff.toml --output CHANGELOG_DRAFT.md \
              || git cliff --config cliff.toml --output CHANGELOG_DRAFT.md
          fi
          {
            echo 'body<<EOF'
            cat CHANGELOG_DRAFT.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create draft beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}-beta-${{ steps.commit.outputs.short_hash }}
          name: ${{ inputs.version }}-beta-${{ steps.commit.outputs.short_hash }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: true
          draft: true
          files: mupen64-rr-lua-${{ inputs.version }}-beta-${{ steps.commit.outputs.short_hash }}.zip