name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x86]

    steps:
      - uses: actions/checkout@v6

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Remove standalone LLVM from PATH (fix CMake picking up wrong clang-cl)
        shell: powershell
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*Program Files\LLVM*' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      # Manual runs have no version suffix, auto-runs set it to `beta-{short_commit_hash}`
      - name: Set VERSION_SUFFIX
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "VERSION_SUFFIX=" >> $env:GITHUB_ENV
          } else {
            $hash = "${{ github.sha }}".Substring(0, 7)
            echo "VERSION_SUFFIX=-beta-$hash" >> $env:GITHUB_ENV
          }

      - name: CMake Setup
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --preset vcpkg-win64-x86

      - name: CMake Build
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --build build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: mupen-debug
          path: build/out
          retention-days: 14

  build-release:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x86]

    steps:
      - uses: actions/checkout@v6

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Remove standalone LLVM from PATH (fix CMake picking up wrong clang-cl)
        shell: powershell
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*Program Files\LLVM*' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      # Manual runs have no version suffix, auto-runs set it to `beta-{short_commit_hash}`
      - name: Set VERSION_SUFFIX
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "VERSION_SUFFIX=" >> $env:GITHUB_ENV
          } else {
            $hash = "${{ github.sha }}".Substring(0, 7)
            echo "VERSION_SUFFIX=-beta-$hash" >> $env:GITHUB_ENV
          }

      - name: CMake Setup
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --preset vcpkg-win64-x86-release

      - name: CMake Build
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --build build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: mupen-release
          path: build/out
          retention-days: 14
