name: Test

on: [push]

jobs:
  test:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x86]

    steps:
      - uses: actions/checkout@v6
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.arch }}

      - name: Remove standalone LLVM from PATH (fix CMake picking up wrong clang-cl)
        shell: powershell
        run: |
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*Program Files\LLVM*' }) -join ';'
          echo "PATH=$env:PATH" >> $env:GITHUB_ENV

      - name: Enable vcpkg binary caching
        shell: powershell
        run: |
          echo "VCPKG_FEATURE_FLAGS=manifests,binarycaching" >> $env:GITHUB_ENV
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> $env:GITHUB_ENV

      - name: Cache vcpkg binaries
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_cache
            build/vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.arch }}-

      - name: CMake Setup
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --preset vcpkg-win64-x86-release

      - name: CMake Build
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: cmake --build build

      - name: CMake Test
        working-directory: ${{env.GITHUB_WORKSPACE}}
        run: ctest --test-dir build
